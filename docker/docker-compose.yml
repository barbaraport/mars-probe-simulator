services:
  mars-probe-simulator-app:
    restart: "no"
    build:
      context: ..
    ports:
      - "${APP_PORT}:8000"
    volumes:
      - .:/app
    depends_on:
      - mars-probe-simulator-db

  mars-probe-simulator-db:
    restart: "no"
    image: postgres:16
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer
    ports:
      - "${ADMINER_PORT}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mars-probe-simulator-db

volumes:
  postgres_data:
