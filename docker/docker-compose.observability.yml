services:
  prometheus:
    image: prom/prometheus
    restart: "always"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - ../.observability-data/${ENV}/prometheus:/prometheus
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    restart: "always"
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_USER_PASSWORD}
    depends_on:
      - prometheus
    volumes:
      - ./grafana/dashboards:/etc/grafana/dashboards:ro
      - ../.observability-data/${ENV}/grafana:/var/lib/grafana

  jaeger:
    image: jaegertracing/jaeger
    restart: "always"
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
      SPAN_STORAGE_TYPE: badger
      BADGER_EPHEMERAL: "false"
      BADGER_DIRECTORY_VALUE: /badger/data
      BADGER_DIRECTORY_KEY: /badger/key
    volumes:
      - ../.observability-data/${ENV}/jaeger/data:/badger/data
      - ../.observability-data/${ENV}/jaeger/key:/badger/key
