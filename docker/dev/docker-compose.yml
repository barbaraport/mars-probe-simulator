include:
  - docker-compose.observability.yml

services:
  mars-probe-simulator-app:
    build:
      context: ..
      dockerfile: docker/dev/Dockerfile
    volumes:
      - ..:/app

  adminer:
    image: adminer
    ports:
      - "${ADMINER_PORT}:8080"
    environment:
      ADMINER_DEFAULT_SERVER: mars-probe-simulator-db
