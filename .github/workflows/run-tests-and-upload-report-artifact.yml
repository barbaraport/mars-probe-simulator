name: Run tests and upload report artifact

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Create .env
        run: |
          cat > .env << EOF
          APP_PORT=${{ vars.APP_PORT }}
          ADMINER_PORT=${{ vars.ADMINER_PORT }}
          DB_HOST=${{ vars.DB_HOST }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ vars.DB_NAME }}
          ENV=${{ vars.ENV }}
          EOF
      - name: Create .env.test
        run: |
          cat > .env.test << EOF
          APP_PORT=${{ vars.APP_PORT }}
          ADMINER_PORT=${{ vars.ADMINER_PORT }}
          DB_HOST=${{ vars.DB_HOST }}
          DB_PORT=${{ vars.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          DB_NAME=${{ vars.DB_NAME }}
          ENV=${{ vars.ENV }}
          EOF
      - name: Run CI checks
        run: |
          mkdir -p /tmp/coverage /tmp/htmlcov
          make ci
      - name: Upload coverage artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: /tmp/htmlcov
